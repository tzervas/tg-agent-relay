name: Swarm-ready task
description: Small, well-scoped task for agent swarms (user story + AC + API)
title: "[swarm] "
labels: ["swarm-ready", "enhancement"]
body:
  - type: input
    id: parent
    attributes:
      label: Parent epic
      description: e.g. #18
      placeholder: "#18"
    validations:
      required: true
  - type: dropdown
    id: size
    attributes:
      label: Size
      options: ["size:S", "size:M", "size:L"]
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options: ["P0", "P1", "P2"]
    validations:
      required: true
  - type: textarea
    id: story
    attributes:
      label: User story
      description: As a … I want … so that …
    validations:
      required: true
  - type: textarea
    id: ac
    attributes:
      label: Acceptance criteria
      description: Checklist the agent must complete
      value: |
        - [ ] 
    validations:
      required: true
  - type: textarea
    id: api
    attributes:
      label: API / schema / files
      description: Functions, paths, env vars, JSON shapes
    validations:
      required: true
  - type: textarea
    id: fixtures
    attributes:
      label: Fixtures / tests
      description: Existing or new fixtures the agent should use
  - type: textarea
    id: oos
    attributes:
      label: Out of scope
  - type: textarea
    id: python
    attributes:
      label: Python version
      value: Prefer **3.14** (`RELAY_PYTHON` / `lib/python.sh`). Use 3.13 only if 3.14 is hard-blocked.
