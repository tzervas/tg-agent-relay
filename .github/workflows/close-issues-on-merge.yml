# Close Fixes/Closes issues only when a PR merges into **main**.
#
# Feature PRs target **dev** and must leave issues open. Epics stay open until
# a final ship issue (Closes #<epic>) is included in a main-bound PR.
# Prefer the self-hosted runner (see docs/SELF_HOSTED_RUNNER.md).
name: close-issues-on-merge

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      pr:
        description: "PR number (must be merged into main)"
        type: string
        required: true
      dry_run:
        description: "List issues without closing"
        type: boolean
        default: false

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  close-linked:
    name: Close issues for main merge
    # Prefer local podman runner; falls back if no runner is registered.
    runs-on: [self-hosted, linux, x64, podman]
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.merged == true &&
       github.event.pull_request.base.ref == 'main')
    steps:
      - uses: actions/checkout@v4

      - name: Install GitHub CLI (gh)
        run: |
          set -euo pipefail
          if command -v gh >/dev/null 2>&1; then
            gh --version
            exit 0
          fi
          if command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq gh
          else
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
              | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
              | sudo tee /etc/apt/sources.list.d/github-cli.list >/dev/null
            sudo apt-get update -qq
            sudo apt-get install -y -qq gh
          fi
          command -v gh >/dev/null 2>&1
          gh --version

      - name: Close linked issues (main only)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr }}
          DRY_INPUT: ${{ inputs.dry_run || false }}
        run: |
          set -euo pipefail
          args=(--pr "$PR_NUMBER")
          if [[ "${DRY_INPUT}" == "true" ]]; then
            args+=(--dry-run)
          fi
          # Script refuses non-main bases unless --any-base
          bash scripts/close-linked-issues.sh "${args[@]}"
