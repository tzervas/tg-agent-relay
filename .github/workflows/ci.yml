# CI — Python 3.14 (uv + ruff + offline tests) and Rust MSRV 1.96
# Issue #38 / epic #21. Gitleaks lives in gitleaks.yml (kept separate).
name: ci

on:
  push:
    branches: [main, master, "fix/**", "ci/**", "feat/**"]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python:
    name: uv + ruff + tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Primary matrix: Python 3.14 (requires-python >=3.14).
        # Optional 3.13 secondary allowed-to-fail is intentionally omitted:
        # the package pins requires-python = ">=3.14".
        python-version: ["3.14"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml

      - name: Python ${{ matrix.python-version }} via uv
        run: uv python install ${{ matrix.python-version }}

      - name: Sync project (dev group + pygments extras)
        # --all-groups installs [dependency-groups] dev (pytest, ruff, pygments).
        run: uv sync --all-groups

      - name: Ruff check
        run: uv run ruff check tg_agent_relay providers lib tests

      - name: Ruff format --check
        run: uv run ruff format --check tg_agent_relay providers lib tests

      - name: Offline tests
        run: |
          export RELAY_PYTHON="$(pwd)/.venv/bin/python"
          bash tests/run-tests.sh

  rust:
    name: rust toolchain (MSRV 1.96)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rust toolchain (MSRV 1.96 via rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@1.96
        with:
          components: rustfmt, clippy

      - name: cargo metadata (workspace must parse)
        run: cargo metadata --no-deps -q

      - name: Assert MSRV pin
        run: |
          set -euo pipefail
          rustc --version | grep -E '^rustc 1\.96\.'
          grep -q 'rust-version = "1.96"' Cargo.toml
          grep -q 'channel = "1.96"' rust-toolchain.toml
          echo "MSRV asserts ok: rustc $(rustc --version), Cargo.toml + rust-toolchain.toml pin 1.96"

      # When crates exist, enable:
      # - run: cargo fmt --all -- --check
      # - run: cargo clippy --workspace --all-targets -- -D warnings
      # - run: cargo test --workspace
