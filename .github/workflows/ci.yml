name: ci

on:
  push:
    branches: [main, master, "fix/**"]
  pull_request:

permissions:
  contents: read

jobs:
  python:
    name: uv + ruff + tests (3.14)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Python 3.14 via uv
        run: uv python install 3.14

      - name: Sync project (dev group)
        run: uv sync --all-groups

      - name: Ruff check
        run: uv run ruff check tg_agent_relay providers lib tests

      - name: Ruff format --check
        run: uv run ruff format --check tg_agent_relay providers lib tests

      - name: Offline tests
        run: |
          export RELAY_PYTHON="$(pwd)/.venv/bin/python"
          bash tests/run-tests.sh

  rust:
    name: rust toolchain (workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rust toolchain (MSRV 1.96 via rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@1.96
        with:
          components: rustfmt, clippy

      - name: cargo metadata (workspace must parse)
        run: cargo metadata --no-deps -q

      - name: Assert MSRV pin
        run: |
          rustc --version | grep -E '^rustc 1\.96\.'
          grep -q 'rust-version = "1.96"' Cargo.toml
          grep -q 'channel = "1.96"' rust-toolchain.toml

      # When crates exist, enable:
      # - run: cargo fmt --all -- --check
      # - run: cargo clippy --workspace --all-targets -- -D warnings
      # - run: cargo test --workspace
