# CI — DISABLED for automatic runs (maintainer: remote Actions off).
# Day-to-day and releases use local gates only:
#   bash scripts/local-ci.sh
#   bash scripts/release.sh vX.Y.Z
#
# workflow_dispatch remains so the YAML can be re-enabled manually if desired.
name: ci

on:
  workflow_dispatch:
    inputs:
      run_tests:
        description: "Run full offline test suite"
        type: boolean
        default: true
      python_version:
        description: "Python version for uv"
        type: string
        default: "3.14"

concurrency:
  group: ci-manual-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python:
    name: uv + ruff + tests (${{ inputs.python_version }})
    runs-on: [self-hosted, linux, x64, podman]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml

      - name: Python ${{ inputs.python_version }} via uv
        run: uv python install ${{ inputs.python_version }}

      - name: Sync project (dev group)
        run: uv sync --all-groups

      - name: Ruff check
        run: uv run ruff check tg_agent_relay providers lib tests

      - name: Ruff format --check
        run: uv run ruff format --check tg_agent_relay providers lib tests

      - name: Offline tests
        if: ${{ inputs.run_tests }}
        run: |
          export RELAY_PYTHON="$(pwd)/.venv/bin/python"
          bash tests/run-tests.sh

  rust:
    name: rust toolchain (MSRV 1.96)
    runs-on: [self-hosted, linux, x64, podman]
    steps:
      - uses: actions/checkout@v4

      - name: Rust toolchain (MSRV 1.96 via rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@1.96
        with:
          components: rustfmt, clippy

      - name: cargo metadata (workspace must parse)
        run: cargo metadata --no-deps -q

      - name: Assert MSRV pin
        run: |
          set -euo pipefail
          rustc --version | grep -E '^rustc 1\.96\.'
          grep -q 'rust-version = "1.96"' Cargo.toml
          grep -q 'channel = "1.96"' rust-toolchain.toml
          echo "MSRV asserts ok: rustc $(rustc --version)"
